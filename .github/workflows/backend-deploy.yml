name: CI/CD Backend - Nutrishare Test

on:
  push:
    branches: ["feature/CI/CD"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK 21 
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy JAR to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "target/*.jar"
          target: "/var/www/temp_deploy"
          strip_components: 1

      - name: Deploy and Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Asegurar que la carpeta del backend existe
            sudo mkdir -p /var/www/nutrishare-backend

            # 2. Mover el nuevo JAR renombrándolo para el servicio
            sudo mv /var/www/temp_deploy/*.jar /var/www/nutrishare-backend/nutri-share-api.jar

            # 3. Limpiar temporales
            sudo rm -rf /var/www/temp_deploy/*

            # 4. Reiniciar el servicio
            sudo systemctl restart nutri-api.service
